name: 🐛 バグ報告
description: バグや不具合を報告してください
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        バグ報告にご協力いただきありがとうございます。
        できるだけ詳しく記入していただけると、迅速な対応が可能になります。

  - type: textarea
    id: description
    attributes:
      label: バグの概要
      description: 発生している問題を簡潔に説明してください
      placeholder: 何が起きていますか？
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 再現手順
      description: バグを再現するための手順を記載してください
      placeholder: |
        1. '...' に移動
        2. '...' をクリック
        3. '...' までスクロール
        4. エラーが表示される
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期待される動作
      description: 本来どのように動作すべきかを説明してください
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 実際の動作
      description: 実際に何が起きたかを説明してください
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: 環境情報
      description: 使用環境を記載してください
      placeholder: |
        - OS: [例: macOS 15.3, Ubuntu 24.04]
        - ブラウザ: [例: Chrome 132]
        - バージョン: [例: v1.0.0]
      render: markdown
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: ログ・エラーメッセージ
      description: 関連するログやエラーメッセージがあれば貼り付けてください
      render: shell
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: スクリーンショット
      description: 問題を示すスクリーンショットがあれば添付してください
    validations:
      required: false

  - type: checkboxes
    id: search
    attributes:
      label: 既存の Issue の確認
      options:
        - label: 同様の Issue が既に報告されていないことを確認しました
          required: true
